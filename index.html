<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위케어 커뮤니티 </title>
    <title> Comtogether++ </title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>컴투게더</h1>
    <p>함께한 활동 기록</p>
</header>

<nav>
    <button onclick="showSection('intro')">활동 소개</button>
    <button onclick="showSection('photo')">활동 사진</button>
    <button onclick="showSection('review')">활동 소감</button>
    <button onclick="showSection('member')">팀원 소개</button>
</nav>

<div id="intro" class="section active">
    <div class="box">
        <h2>활동 소개</h2>

        <p>
            위케어 활동을 통해 문화교류와 웹 개발 활동 등을 진행하였다.
        </p>

        <button onclick="changeColor()">배경색 변경</button>

        <p id="quote"></p>
    </div>
</div>

<div id="photo" class="section">
    <div class="box">
        <h2>활동 사진</h2>

        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo1.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo2.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo3.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo4.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo5.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo6.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo7.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo8.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo9.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo10.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo11.png">
        <img src="https://daeun03300.github.io/wecare-comtogether-/images/photo12.png">
    </div>
</div>

<div id="review" class="section">
    <div class="box">

        <h2>활동 소감</h2>

        <button onclick="showReview()">소감 보기</button>

        <p id="reviewText"></p>

    </div>
</div>

<div id="member" class="section">
    <div class="box">

        <h2>팀원 소개</h2>

        <p>이다은 컴퓨터공학과 24</p>
        <p>신민꼬 컴퓨터공학과 25</p>
        <p>소우산디 컴퓨터공학과 25</p>

    </div>
</div>

<div id="popup" onclick="closePopup()">
    <img id="popupImg">
</div>

<script src="script.js"></script>

</body>
</html>
